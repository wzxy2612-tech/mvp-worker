name: MVP Worker CI/CD

# 【重要修正】移除了顶层的 concurrency 锁，避免 push 触发时踩空值

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      action:
        description: "操作路由 (deploy: 走完整发版流 | rollback: 极速回滚)"
        type: choice
        required: true
        default: deploy
        options:
          - deploy
          - rollback
      confirm_rollback:
        description: "【防误触】仅当 action 选 rollback 时，必须输入 YES_ROLLBACK"
        type: string
        required: false
        default: ""
      trace_id:
        description: "Correlation ID from control plane"
        required: false
        type: string
        default: ""

run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && format('部署分支/环境: {0} | 溯源ID: {1}', github.ref_name, inputs.trace_id || 'manual') || format('Push: {0}', github.sha) }}

jobs:
  preflight:
    name: Preflight & Lock Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
    env:
      CONTROLLER_URL: "https://mvp-ci-controller.my-mvp-worker.workers.dev"
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
      TRACE_ID: ${{ github.event.inputs.trace_id || format('push-{0}', github.run_id) }}
      RUN_ID: ${{ github.run_id }}
    steps:
      # ① 無條件發出出生證明 (獲取數據庫 seq)
      # ② 基於自身 trace_id 查 /lock (First-wins: min_seq 最小的活躍 trace 佔有鎖)
      # ③ 如果被鎖，發死亡證明並自盡
      - name: Emit pipeline_started & Lock Check
        run: |
          set -euo pipefail

          # ① 無條件發出出生證明 (獲取數據庫 seq)
          BODY=$(jq -nc --arg t "$TRACE_ID" --arg r "$RUN_ID" \
            '{trace_id:$t, action:"pipeline_started", dispatch_ok:1, detail:({run_id:$r}|tostring)}')

          HTTP_START=$(curl -sS --max-time 10 --retry 2 -o /tmp/audit.out -w '%{http_code}' \
            -X POST "${CONTROLLER_URL%/}/audit" \
            -H "X-Trigger-Secret: $TRIGGER_SECRET" \
            -H "Content-Type: application/json" \
            -d "$BODY") || HTTP_START="000"

          if [[ ! "$HTTP_START" =~ ^2 ]]; then
            echo "::error::pipeline_started 未落庫 (HTTP $HTTP_START)。鎖失明，中止。"
            cat /tmp/audit.out || true
            exit 1
          fi

          # ② 基於自身 trace_id 查鎖 (尋找是否有更早的 seq)
          HTTP_LOCK=$(curl -sS --max-time 10 --retry 2 -o /tmp/lock.out -w '%{http_code}' \
            -X GET "${CONTROLLER_URL%/}/lock?trace_id=$TRACE_ID" \
            -H "X-Trigger-Secret: $TRIGGER_SECRET") || HTTP_LOCK="000"

          if [[ "$HTTP_LOCK" == "409" ]]; then
            echo "::error::被更早的活躍任務鎖定。主動退讓以避免破壞環境。"
            cat /tmp/lock.out || true
            exit 1
          elif [[ ! "$HTTP_LOCK" =~ ^2 ]]; then
            echo "::error::查鎖失敗 (HTTP $HTTP_LOCK)。Fail-closed 啟動，中止。"
            exit 1
          fi

          echo "鎖檢查通過，准許部署。"

      # 🚨 新增：preflight 的終極安全網 — 任何失敗都發死亡證明
      - name: Signal pipeline_failed (any preflight failure)
        if: failure()
        run: |
          BODY=$(jq -nc --arg t "$TRACE_ID" \
            '{trace_id:$t, action:"pipeline_failed", dispatch_ok:0, detail:"preflight aborted: locked by an older trace, or lock query failed"}')
          curl -sS --max-time 10 -X POST "${CONTROLLER_URL%/}/audit" \
            -H "X-Trigger-Secret: $TRIGGER_SECRET" -H "Content-Type: application/json" \
            -d "$BODY" || true

  test:
    name: Run Tests
    needs: preflight
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
    env:
      CONTROLLER_URL: "https://mvp-ci-controller.my-mvp-worker.workers.dev"
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
      TRACE_ID: ${{ github.event.inputs.trace_id || format('push-{0}', github.run_id) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npm test

      - name: Signal pipeline_failed
        if: failure()
        run: |
          BODY=$(jq -nc --arg t "$TRACE_ID" \
            '{trace_id:$t, action:"pipeline_failed", dispatch_ok:0, detail:"test/npm ci failed before any deploy"}')
          curl -sS --max-time 10 -X POST "${CONTROLLER_URL%/}/audit" \
            -H "X-Trigger-Secret: $TRIGGER_SECRET" -H "Content-Type: application/json" \
            -d "$BODY" || true

      - name: Signal cancelled
        if: cancelled()
        run: |
          BODY=$(jq -nc --arg t "$TRACE_ID" \
            '{trace_id:$t, action:"cancelled", dispatch_ok:0, detail:"test job cancelled"}')
          curl -sS --max-time 10 -X POST "${CONTROLLER_URL%/}/audit" \
            -H "X-Trigger-Secret: $TRIGGER_SECRET" -H "Content-Type: application/json" \
            -d "$BODY" || true

  deploy-staging:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    # 【Patch 2】Staging 也要串行，防止裸奔和批量制造 ghost gate_waiting
    concurrency:
      group: staging-deploy
      cancel-in-progress: false
    env:
      CONTROLLER_URL: "https://mvp-ci-controller.my-mvp-worker.workers.dev"
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
      TRACE_ID: ${{ github.event.inputs.trace_id || format('push-{0}', github.run_id) }}
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - name: Deploy Staging
        env:
          CLOUDFLARE_ENV: staging
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/deploy.sh

      - name: Signal pipeline_failed
        if: failure()
        run: |
          BODY=$(jq -nc --arg t "$TRACE_ID" \
            '{trace_id:$t, action:"pipeline_failed", dispatch_ok:0, detail:"staging deploy failed before reaching production"}')
          curl -sS --max-time 10 -X POST "${CONTROLLER_URL%/}/audit" \
            -H "X-Trigger-Secret: $TRIGGER_SECRET" -H "Content-Type: application/json" \
            -d "$BODY" || true

      - name: Signal cancelled
        if: cancelled()
        run: |
          BODY=$(jq -nc --arg t "$TRACE_ID" \
            '{trace_id:$t, action:"cancelled", dispatch_ok:0, detail:"staging job cancelled"}')
          curl -sS --max-time 10 -X POST "${CONTROLLER_URL%/}/audit" \
            -H "X-Trigger-Secret: $TRIGGER_SECRET" -H "Content-Type: application/json" \
            -d "$BODY" || true

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    env:
      CONTROLLER_URL: "https://mvp-ci-controller.my-mvp-worker.workers.dev"
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
      TRACE_ID: ${{ github.event.inputs.trace_id || format('push-{0}', github.run_id) }}
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
    # 并发驱逐锁。cancel-in-progress: false 下 GitHub 的默认行为是 queue: single —
    # 后来者不会强杀先来者,但当先来者自然结束后,队列里的下一个立即顶上。
    # 注意这并非"老实排队",late-arriving waiter 会抢占最早 waiter 的执行权。
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - name: Signal prod_started
        run: |
          curl -sS --max-time 10 -X POST "${CONTROLLER_URL%/}/audit" \
            -H "X-Trigger-Secret: $TRIGGER_SECRET" -H "Content-Type: application/json" \
            -d "{\"trace_id\":\"$TRACE_ID\",\"action\":\"prod_started\",\"dispatch_ok\":1,\"detail\":\"approved, deploying prod\"}" || true
      
      # 【Patch 1】将 deploy 和 auto_rollback 从 bash || 中拆开，避免抢占时引发竞争回滚
      - name: Deploy Production
        id: deploy_prod
        env:
          CLOUDFLARE_ENV: production
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/deploy.sh
        
      - name: Auto rollback on failure
        if: failure() && steps.deploy_prod.outcome == 'failure'
        env:
          CLOUDFLARE_ENV: production
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTROLLER_URL: "https://mvp-ci-controller.my-mvp-worker.workers.dev"
          TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
          TRACE_ID: ${{ github.event.inputs.trace_id || format('push-{0}', github.run_id) }}
          ROLLBACK_MESSAGE: "Auto rollback: production health gate failed"
          ROLLBACK_SOURCE: "auto_rollback"
        run: |
          echo "::error::部署或健康检查失败，正在触发回滚..."
          bash scripts/rollback.sh

      - name: Signal cancelled
        if: cancelled()
        run: |
          # 取消硬编码的抢占理由，改为更诚实的描述
          BODY=$(jq -nc --arg t "$TRACE_ID" \
            '{trace_id:$t, action:"cancelled", dispatch_ok:0, detail:"job cancelled while running (preemption or manual)"}')
          curl -sS --max-time 10 -X POST "${CONTROLLER_URL%/}/audit" \
            -H "X-Trigger-Secret: $TRIGGER_SECRET" -H "Content-Type: application/json" \
            -d "$BODY" || true

      # 🚨 新增：npm ci 等 deploy 前置步驟失敗時，不觸發回滾，改發死亡證明
      - name: Signal pipeline_failed (died before prod deploy)
        if: failure() && steps.deploy_prod.outcome != 'failure'
        run: |
          BODY=$(jq -nc --arg t "$TRACE_ID" \
            '{trace_id:$t, action:"pipeline_failed", dispatch_ok:0, detail:"prod job failed before the deploy step ran (nothing was deployed)"}')
          curl -sS --max-time 10 -X POST "${CONTROLLER_URL%/}/audit" \
            -H "X-Trigger-Secret: $TRIGGER_SECRET" -H "Content-Type: application/json" -d "$BODY" || true

  rollback:
    name: Rollback Production (manual)
    runs-on: ubuntu-latest
    # 追加了 event_name 判断，彻底杜绝 push 事件意外解析该逻辑的可能性
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback' && github.event.inputs.confirm_rollback == 'YES_ROLLBACK' }}
    environment: production-rollback
    # Job 级别的抢占锁（救护车：强制踢掉同组正在运行的部署任务）
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - name: Rollback
        env:
          CLOUDFLARE_ENV: production
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTROLLER_URL: "https://mvp-ci-controller.my-mvp-worker.workers.dev"
          TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
          # 【Patch 3 附带】修改回滚兜底 trace_id 为 rollback-{0}
          TRACE_ID: ${{ github.event.inputs.trace_id || format('rollback-{0}', github.run_id) }}
          ROLLBACK_SOURCE: "manual_rollback"
          ROLLBACK_MESSAGE: "Manual rollback via control plane"
        run: bash scripts/rollback.sh
        
      # 【Patch 3】防止第二个回滚抢占第一个回滚时产生静默 ghost
      - name: Signal cancelled
        if: cancelled()
        env:
          CONTROLLER_URL: "https://mvp-ci-controller.my-mvp-worker.workers.dev"
          TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
          TRACE_ID: ${{ github.event.inputs.trace_id || format('rollback-{0}', github.run_id) }}
        run: |
          curl -sS --max-time 10 -X POST "${CONTROLLER_URL%/}/audit" \
            -H "X-Trigger-Secret: $TRIGGER_SECRET" -H "Content-Type: application/json" \
            -d "{\"trace_id\":\"$TRACE_ID\",\"action\":\"cancelled\",\"dispatch_ok\":0,\"detail\":\"rollback job cancelled (preempted by a newer rollback)\"}" || true